services:
  - type: web
    name: medisimple
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Optimal and stable
      - key: FLASK_ENV
        value: production
